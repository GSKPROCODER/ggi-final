services:
  # ── Database Layer ──────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: nexus-db
    environment:
      POSTGRES_USER: nexus_user
      POSTGRES_PASSWORD: nexus_password
      POSTGRES_DB: nexus_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus_user -d nexus_ai"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Cache Layer ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Storage Layer (Local S3) ────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: nexus-minio
    environment:
      MINIO_ROOT_USER: nexus_admin
      MINIO_ROOT_PASSWORD: nexus_password
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend Layer (Docker-only, not used with nexus-runner) ──────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexus-backend
    profiles: ["full"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      # These will override settings in app.core.config
      DATABASE_URL: "postgresql+asyncpg://nexus_user:nexus_password@db:5432/nexus_ai"
      REDIS_URL: "redis://redis:6379/0"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: "nexus_admin"
      MINIO_SECRET_KEY: "nexus_password"
      # Forward the Gemini Key from host env
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    ports:
      - "8000:8000"
    restart: always

  # ── Frontend Layer (Docker-only, not used with nexus-runner) ─────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexus-frontend
    profiles: ["full"]
    depends_on:
      - backend
    ports:
      - "3000:80"
    environment:
      VITE_API_URL: "http://localhost:8000/api/v1"
    restart: always


volumes:
  postgres_data:
  minio_data:
